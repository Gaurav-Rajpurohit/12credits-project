---
- name: Force Deploy Blue Environment
  hosts: webservers
  vars_files:
    - group_vars/all.yml
  tasks:
    - name: Force override target facts to Blue
      set_fact:
        active_env: "green"
        active_port: "{{ green_port }}"
        target_env: "blue"
        target_port: "{{ blue_port }}"

    - name: Run deployment inside block
      block:
        - name: Setup system dependencies
          import_role:
            name: common

        - name: Launch Blue containers
          command: "docker compose -f docker-compose.blue.yml up -d --build"
          args:
            chdir: "{{ docker_dir }}"

        - name: Verify health checks
          import_role:
            name: health_check

        - name: Switch traffic and stop Green containers
          import_role:
            name: traffic_switch

      rescue:
        - name: Run rollback
          include_tasks: rollback_tasks.yml
